<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0"/>
  <title>Cadastro de Usuário</title>

  <!-- CSS  -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="css/materialize.css" type="text/css" rel="stylesheet" media="screen,projection"/>
  <link href="css/style.css" type="text/css" rel="stylesheet" media="screen,projection"/>
</head>
<body>
  <nav class="light-blue lighten-1" role="navigation">
    <div class="nav-wrapper container"><a id="logo-container" href="#" class="brand-logo">BCP</a>
      <ul class="right hide-on-med-and-down">
        <li><a href="#">Navbar Link</a></li>
      </ul>

      <ul id="nav-mobile" class="sidenav">
        <li><a href="#">Navbar Link</a></li>
      </ul>
      <a href="#" data-target="nav-mobile" class="sidenav-trigger"><i class="material-icons">menu</i></a>
    </div>
  </nav>
  <div class="section no-pad-bot" id="index-banner">
    <div class="container">
      <h1 class="header center orange-text">Cadastro</h1>
      <div class="row center">
        <h5 class="header col s12 light">Digite suas informações informações</h5>
      </div>
      <div class="row">
    <form class="col s12 ">
      <div class="row">
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">account_circle</i>
          <input id="icon_prefix" type="text" class="validate">
          <label for="icon_prefix">First Name</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">account_circle</i>
          <input id="icon_suffix" type="text" class="validate">
          <label for="icon_suffix">Last Name</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">phone</i>
          <input id="icon_telephone" type="tel" class="validate">
          <label for="icon_telephone">Telephone</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">phone</i>
          <input id="icon_cellphone" type="tel" class="validate">
          <label for="icon_cellphone">Cell Phone</label>
        </div>
        <div class="row">
        <div class="input-field col s12">
          <i class="material-icons prefix">email</i>
          <input id="email" type="email" class="validate">
          <label for="email">Email</label>
          <div class="row">
            <div class="input-field col s12">
              <i class="material-icons prefix">lock</i>
              <input id="password" type="password" class="validate">
              <label for="password">Password</label>
            </div>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">location_on</i>
          <input onmouseout="preencher()" id="CEP" type="text" class="validate">
          <label for="CEP">CEP</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">location_on</i>
          <input id="ESTADO" type="text" class="validate">
          <label for="ESTADO">Estado</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">location_city</i>
          <input id="CIDADE" type="text" class="validate">
          <label for="CIDADE">Cidade</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">home</i>
          <input id="LUGADOURO" type="text" class="validate">
          <label for="LUGADOURO">Logradouro</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">location_on</i>
          <input id="BAIRRO" type="text" class="validate">
          <label for="BAIRRO">Bairro</label>
        </div>
        <div class="input-field col s12 m6">
          <i class="material-icons prefix">phone</i>
          <input id="DDD" type="text" class="validate">
          <label for="DDD">DDD</label>
        </div>
        <div class="input-field col s12 m12">
          <a class="waves-effect waves-light btn-small" onclick="preencher()">Buscar</a>
          <a class="waves-effect waves-light btn-small" onclick="apagar()">Limpar</a>
      </div>
    </form>
  </div>

  
  <!--  Scripts-->
  <script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
  <script src="js/materialize.js"></script>
  <script src="js/init.js"></script>
  <script src="js/scripts.js"></script>

  </body>
</html>
